<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araba Sürüş Prototipi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #fff;
            background: rgba(0, 0, 0, 0.45);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
            pointer-events: none;
            z-index: 10;
            user-select: none;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            z-index: 100;
        }

        #loading.hidden {
            display: none;
        }

        /* Mobil kontroller */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 16px;
            z-index: 20;
            pointer-events: none;
        }

        .ctrl-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .btn {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: #fff;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .btn:active,
        .btn.active {
            background: rgba(255, 255, 255, 0.4);
        }



        @media (max-width: 480px) {
            #hud {
                font-size: 12px;
                padding: 6px 10px;
            }

            .btn {
                width: 54px;
                height: 54px;
                font-size: 20px;
            }


        }
    </style>
</head>

<body>

    <div id="loading">Model yükleniyor...</div>

    <div id="hud">
        Hız: <span id="speedVal">0</span> km/h<br>
        Kontroller: W/↑ gaz, S/↓ fren-geri, A/D veya ←/→ dön
    </div>



    <div id="controls">
        <div class="ctrl-group">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        <div class="ctrl-group">
            <div class="btn" id="btnBrake">▼</div>
            <div class="btn" id="btnGas">▲</div>
        </div>
    </div>

    <!-- Three.js + FBXLoader (CDN import, tek dosya bağımlılığı yok) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.6.9/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>

    <script>
        (function () {
            'use strict';

            // ------------------------------
            // Temel sahne kurulumu — NFS MW Sepia/Gündüz
            // ------------------------------
            const scene = new THREE.Scene();
            // NFS MW karakteristik sepia/kirli gri gökyüzü rengi (daha koyu ki patlamasın)
            const skyColor = new THREE.Color(0x403d35);
            scene.background = skyColor;
            scene.fog = new THREE.FogExp2(skyColor, 0.0055);

            const camera = new THREE.PerspectiveCamera(
                75, window.innerWidth / window.innerHeight, 0.1, 1000
            );

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            // ---- Kapalı hava ışıklandırma (NFS MW tarzı sarımtırak/yeşilimsi) ----
            const hemi = new THREE.HemisphereLight(0x7a7970, 0x333330, 0.8);
            scene.add(hemi);

            // Güneş ışığı (bulutlar arasından sızan soluk sarımtırak ışık)
            const moonLight = new THREE.DirectionalLight(0xa5a290, 1.0);
            moonLight.position.set(30, 60, -20);
            moonLight.castShadow = true;
            moonLight.shadow.mapSize.set(2048, 2048);
            moonLight.shadow.camera.left = -80;
            moonLight.shadow.camera.right = 80;
            moonLight.shadow.camera.top = 80;
            moonLight.shadow.camera.bottom = -80;
            scene.add(moonLight);

            // ---- Şimşek ışığı (DirectionalLight — flash sırasında parlar) ----
            const lightningLight = new THREE.DirectionalLight(0xccccff, 0);
            lightningLight.position.set(-20, 100, 40);
            scene.add(lightningLight);

            // ---- Far ışıkları (sahneye eklenir, her frame araba takip eder) ----
            function createHeadlight(offsetX) {
                const light = new THREE.SpotLight(0xfff5dd, 6, 100, Math.PI / 5.5, 0.5, 1.4);
                light.castShadow = true;
                light.shadow.mapSize.set(1024, 1024);
                const target = new THREE.Object3D();
                scene.add(light);
                scene.add(target);
                light.target = target;
                return { light, target, offsetX };
            }
            const headL = createHeadlight(-0.65);
            const headR = createHeadlight(0.65);

            // Araba üzerinde sabit PointLight (soluk ışık)
            const carTopLight = new THREE.PointLight(0x888880, 0.4, 25, 2);
            carTopLight.position.set(0, 6, 0);
            scene.add(carTopLight);

            function updateHeadlights() {
                const heading = carState.heading;
                const forward = new THREE.Vector3(Math.sin(heading), 0, Math.cos(heading));
                const right = new THREE.Vector3(Math.cos(heading), 0, -Math.sin(heading));

                [headL, headR].forEach((h) => {
                    // Far pozisyonu: arabanın önünde, hafif yanlarda
                    const pos = car.position.clone()
                        .add(right.clone().multiplyScalar(h.offsetX))
                        .add(new THREE.Vector3(0, 0.7, 0))
                        .add(forward.clone().multiplyScalar(2.2));
                    h.light.position.copy(pos);

                    // Hedef: ileri yönde uzak nokta
                    const tgt = pos.clone().add(forward.clone().multiplyScalar(40));
                    tgt.y = 0;
                    h.target.position.copy(tgt);
                });

                // Araba üstü ışık pozisyonu
                carTopLight.position.copy(car.position).add(new THREE.Vector3(0, 5, 0));
            }


            // ---- Kapalı hava bulut katmanı (NFS MW Overcast) ----
            (function createOvercastClouds() {
                const cv = document.createElement('canvas');
                cv.width = 1024; cv.height = 1024;
                const cx = cv.getContext('2d');

                // Zemin rengi
                cx.fillStyle = 'rgba(90, 88, 80, 0.4)';
                cx.fillRect(0, 0, 1024, 1024);

                // Bulut kümeleri (kirli gri/kahve tonlar) - Çok daha yoğun!
                for (let i = 0; i < 2500; i++) {
                    const x = Math.random() * 1024;
                    const y = Math.random() * 1024;
                    const r = 60 + Math.random() * 180; // Bulutlar biraz daha büyük

                    const grad = cx.createRadialGradient(x, y, 0, x, y, r);
                    // Yoğun koyu kısımlar
                    const colorVal = 50 + Math.random() * 50;
                    grad.addColorStop(0, `rgba(${colorVal}, ${colorVal - 5}, ${colorVal - 10}, 0.95)`); // Daha koyu ve opak
                    grad.addColorStop(1, 'rgba(100, 100, 95, 0)');

                    cx.fillStyle = grad;
                    cx.fillRect(x - r, y - r, r * 2, r * 2);
                }

                const tex = new THREE.CanvasTexture(cv);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(4, 4);

                const cloudGeo = new THREE.PlaneGeometry(1200, 1200);
                const cloudMat = new THREE.MeshBasicMaterial({
                    map: tex, transparent: true, opacity: 0.9,
                    depthWrite: false, side: THREE.DoubleSide, fog: true
                });

                const clouds = new THREE.Mesh(cloudGeo, cloudMat);
                clouds.rotation.x = -Math.PI / 2;
                clouds.position.y = 90;
                scene.add(clouds);
            })();
            // ============================
            // SINIRSIZ DÜNYA — NFS MW TARZI
            // ============================
            // ============================
            const CHUNK_LEN = 60;
            const NUM_CHUNKS = 14;
            const ROAD_W = 28; // geniş 4-şeritli yol
            const SIDEWALK_W = 4;

            // ---- Zemin (kirli beton/toprak rengi) ----
            const groundGeo = new THREE.PlaneGeometry(600, 600);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x4a4944, roughness: 0.9, metalness: 0.05
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // ---- Materyaller (paylaşılan) ----
            // Yol: kirli, aşınmış gri beton/asfalt rengi
            const roadChunkMat = new THREE.MeshStandardMaterial({
                color: 0x5a5b5c, roughness: 0.7, metalness: 0.1
            });
            const yellowMarkMat = new THREE.MeshStandardMaterial({
                color: 0xb59a22, roughness: 0.8, metalness: 0.0,
                polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1
            });
            const whiteMarkMat = new THREE.MeshStandardMaterial({
                color: 0x888888, roughness: 0.8, metalness: 0.0,
                polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1
            });
            // Kaldırım: daha açık ama kirli beton
            const sidewalkMat = new THREE.MeshStandardMaterial({
                color: 0x6e6d68, roughness: 0.9, metalness: 0.0
            });
            // Bariyerler: beton grisi
            const barrierMat = new THREE.MeshStandardMaterial({
                color: 0x555555, roughness: 0.9, metalness: 0.0
            });

            // Bina materyalleri (Endüstriyel kirli tonlar, tuğla ve beton)
            const buildingColors = [
                0x3b3a37, 0x45433e, 0x2d2d2b, 0x3a3530,
                0x42403c, 0x363738, 0x2e2925, 0x4a4540
            ];
            // Konteyner renkleri (Soluk ve paslı NFS MW tonları)
            const containerColors = [0x7a3028, 0x2a4559, 0x8a5528, 0x3a553a, 0x5a4a3a];

            // ---- Chunk oluşturma ----
            function createRoadChunk(zPos) {
                const chunk = new THREE.Group();
                chunk.userData.baseZ = zPos;

                // Yol yüzeyi
                const roadMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(ROAD_W, CHUNK_LEN), roadChunkMat
                );
                roadMesh.rotation.x = -Math.PI / 2;
                roadMesh.position.y = 0.01;
                roadMesh.receiveShadow = true;
                chunk.add(roadMesh);

                // Kaldırımlar (yolun iki yanı)
                [-1, 1].forEach(side => {
                    const sw = new THREE.Mesh(
                        new THREE.BoxGeometry(SIDEWALK_W, 0.15, CHUNK_LEN), sidewalkMat
                    );
                    sw.position.set(side * (ROAD_W / 2 + SIDEWALK_W / 2), 0.075, 0);
                    sw.receiveShadow = true;
                    chunk.add(sw);
                });

                // Beton bariyerler (yol kenarı)
                [-1, 1].forEach(side => {
                    const barrier = new THREE.Mesh(
                        new THREE.BoxGeometry(0.4, 0.8, CHUNK_LEN), barrierMat
                    );
                    barrier.position.set(side * (ROAD_W / 2 - 0.3), 0.4, 0);
                    barrier.castShadow = true;
                    barrier.receiveShadow = true;
                    chunk.add(barrier);
                });

                // Sarı orta çizgi (çift çizgi — NFS MW tarzı)
                for (let z = -CHUNK_LEN / 2 + 2; z < CHUNK_LEN / 2; z += 8) {
                    const mark = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.3, 5), yellowMarkMat
                    );
                    mark.rotation.x = -Math.PI / 2;
                    mark.position.set(-0.35, 0.015, z);
                    chunk.add(mark);
                    const mark2 = mark.clone();
                    mark2.position.x = 0.35;
                    chunk.add(mark2);
                }

                // Şerit çizgileri (beyaz kesikli — her şerit arası)
                [-7, 7].forEach(laneX => {
                    for (let z = -CHUNK_LEN / 2 + 2; z < CHUNK_LEN / 2; z += 12) {
                        const mark = new THREE.Mesh(
                            new THREE.PlaneGeometry(0.2, 4), whiteMarkMat
                        );
                        mark.rotation.x = -Math.PI / 2;
                        mark.position.set(laneX, 0.015, z);
                        chunk.add(mark);
                    }
                });

                // Kenar çizgileri (solid beyaz)
                [-ROAD_W / 2 + 0.5, ROAD_W / 2 - 0.5].forEach(edgeX => {
                    const edge = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.25, CHUNK_LEN), whiteMarkMat
                    );
                    edge.rotation.x = -Math.PI / 2;
                    edge.position.set(edgeX, 0.015, 0);
                    chunk.add(edge);
                });

                // ---- Binalar (endüstriyel — NFS MW) ----
                [-1, 1].forEach(side => {
                    const baseX = side * (ROAD_W / 2 + SIDEWALK_W + 2);
                    const numBuildings = 2 + Math.floor(Math.random() * 3);
                    let zCursor = -CHUNK_LEN / 2 + 3;

                    for (let b = 0; b < numBuildings && zCursor < CHUNK_LEN / 2 - 5; b++) {
                        const bType = Math.random();

                        if (bType < 0.4) {
                            // Büyük depo/fabrika binası
                            const w = 8 + Math.random() * 12;
                            const h = 6 + Math.random() * 14;
                            const d = 10 + Math.random() * 15;
                            const col = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                            const bMat = new THREE.MeshStandardMaterial({
                                color: col, roughness: 0.85, metalness: 0.1
                            });
                            const bMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bMat);
                            bMesh.position.set(baseX + side * w / 2, h / 2, zCursor + d / 2);
                            bMesh.castShadow = true;
                            bMesh.receiveShadow = true;
                            chunk.add(bMesh);
                            zCursor += d + 2 + Math.random() * 4;

                        } else if (bType < 0.7) {
                            // Konteyner yığını
                            const numContainers = 1 + Math.floor(Math.random() * 3);
                            for (let c = 0; c < numContainers; c++) {
                                const cCol = containerColors[Math.floor(Math.random() * containerColors.length)];
                                const cMat = new THREE.MeshStandardMaterial({
                                    color: cCol, roughness: 0.7, metalness: 0.15
                                });
                                const cMesh = new THREE.Mesh(
                                    new THREE.BoxGeometry(2.5, 2.5, 6), cMat
                                );
                                const stackY = c * 2.5 + 1.25;
                                cMesh.position.set(
                                    baseX + side * (2 + Math.random() * 3),
                                    stackY,
                                    zCursor + 3
                                );
                                cMesh.castShadow = true;
                                cMesh.receiveShadow = true;
                                chunk.add(cMesh);
                            }
                            zCursor += 8 + Math.random() * 4;

                        } else {
                            // İnce yüksek kule/baca
                            const tw = 1.5 + Math.random() * 2;
                            const th = 15 + Math.random() * 25;
                            const tMat = new THREE.MeshStandardMaterial({
                                color: 0x1a1a1a, roughness: 0.9, metalness: 0.05
                            });
                            const tMesh = new THREE.Mesh(
                                new THREE.BoxGeometry(tw, th, tw), tMat
                            );
                            tMesh.position.set(baseX + side * 4, th / 2, zCursor + tw);
                            tMesh.castShadow = true;
                            tMesh.receiveShadow = true;
                            chunk.add(tMesh);
                            zCursor += tw + 8 + Math.random() * 6;
                        }
                    }
                });

                chunk.position.z = zPos;
                scene.add(chunk);
                return chunk;
            }

            // Chunk havuzu oluştur
            const chunks = [];
            for (let i = 0; i < NUM_CHUNKS; i++) {
                chunks.push(createRoadChunk((i - 3) * CHUNK_LEN));
            }

            // ---- Sınırsız dünya güncelleme ----
            function updateInfiniteWorld() {
                const carZ = car.position.z;

                // Zemin arabayı takip etsin
                ground.position.x = car.position.x;
                ground.position.z = carZ;

                // Chunk geri dönüşümü
                chunks.sort((a, b) => a.position.z - b.position.z);
                const frontZ = chunks[chunks.length - 1].position.z;
                const backLimit = carZ - CHUNK_LEN * 3;

                chunks.forEach(chunk => {
                    if (chunk.position.z + CHUNK_LEN / 2 < backLimit) {
                        // Bu chunk'ı kaldır ve yenisini en öne koy
                        scene.remove(chunk);
                        const idx = chunks.indexOf(chunk);
                        const newZ = frontZ + CHUNK_LEN;
                        const newChunk = createRoadChunk(newZ);
                        chunks[idx] = newChunk;
                    }
                });
            }



            // ============================
            // ŞİMŞEK SİSTEMİ (2-6 saniyede bir)
            // ============================
            let lightningTimer = 2 + Math.random() * 4; // ilk şimşek zamanı
            let lightningFlash = 0; // mevcut flash yoğunluğu (0-1)
            let lightningPhase = 0; // 0 = bekleme, 1 = flash aşamaları
            let lightningFlashSteps = [];
            let lightningStepIndex = 0;

            // Overlay div — ekran beyaz flash efekti
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(200,200,255,0);pointer-events:none;z-index:5;transition:background 0.05s;';
            document.body.appendChild(flashOverlay);

            function triggerLightning() {
                // Birden fazla flash adımı (doğal şimşek hissi)
                const numFlashes = 2 + Math.floor(Math.random() * 3); // 2-4 flash
                lightningFlashSteps = [];
                for (let i = 0; i < numFlashes; i++) {
                    lightningFlashSteps.push({
                        intensity: 0.6 + Math.random() * 0.4, // 0.6 - 1.0
                        duration: 0.04 + Math.random() * 0.06, // 40-100ms
                        gap: 0.03 + Math.random() * 0.08 // arası bekleme
                    });
                }
                lightningStepIndex = 0;
                lightningPhase = 1;
                // Pozisyonu rastgele değiştir
                lightningLight.position.set(
                    (Math.random() - 0.5) * 100,
                    80 + Math.random() * 40,
                    (Math.random() - 0.5) * 100
                );
            }

            function updateLightning(dt) {
                if (lightningPhase === 0) {
                    // bekleme
                    lightningTimer -= dt;
                    if (lightningTimer <= 0) {
                        triggerLightning();
                        lightningTimer = 2 + Math.random() * 4; // sonraki: 2-6 sn
                    }
                    lightningLight.intensity = 0;
                    lightningFlash = 0;
                } else {
                    // flash aşaması
                    if (lightningStepIndex >= lightningFlashSteps.length) {
                        lightningPhase = 0;
                        lightningLight.intensity = 0;
                        lightningFlash = 0;
                    } else {
                        const step = lightningFlashSteps[lightningStepIndex];
                        step.duration -= dt;
                        if (step.duration > 0) {
                            // parlak
                            lightningLight.intensity = step.intensity * 6;
                            lightningFlash = step.intensity;
                        } else {
                            step.gap -= dt;
                            lightningLight.intensity = 0;
                            lightningFlash = 0;
                            if (step.gap <= 0) {
                                lightningStepIndex++;
                            }
                        }
                    }
                }
                // Ekran flash overlay
                const alpha = lightningFlash * 0.18;
                flashOverlay.style.background = `rgba(200,200,255,${alpha})`;
            }

            // (Far ışıkları artık scene-level, updateHeadlights() ile güncelleniyor)

            // ------------------------------
            // Araba: FBX yükleme + placeholder fallback
            // ------------------------------
            let car = new THREE.Group();
            scene.add(car);
            car.position.set(0, 0, 0);

            function addPlaceholderCar() {
                // FBX yüklenemezse veya hazır olmadan test edilirken kullanılacak basit kutu araba
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 1, 4),
                    new THREE.MeshStandardMaterial({ color: 0xd9432b })
                );
                body.position.y = 0.6;
                body.castShadow = true;
                car.add(body);

                const cabin = new THREE.Mesh(
                    new THREE.BoxGeometry(1.4, 0.6, 1.8),
                    new THREE.MeshStandardMaterial({ color: 0x222222 })
                );
                cabin.position.set(0, 1.2, -0.2);
                cabin.castShadow = true;
                car.add(cabin);
            }

            const loadingEl = document.getElementById('loading');
            const loader = new THREE.FBXLoader();

            // ÖNEMLİ: GitHub'ın Releases indirme bucket'ı CORS header'ı göndermiyor,
            // bu yüzden car.fbx repo içine normal dosya olarak commit edilip
            // raw.githubusercontent.com üzerinden çekiliyor (bu domain CORS destekliyor).
            // Kendi repo/branch/path bilgine göre aşağıdaki URL'yi güncelle.
            const CAR_FBX_URL = 'https://raw.githubusercontent.com/Softsprout/veloralp-case/main/car.fbx';
            // Texture'lar repo'da ayrı bir klasörde (Textures/) duruyor.
            // FBX içindeki texture referansları genelde export edilen bilgisayarın
            // mutlak path'ini içerir, tarayıcı bunu bulamaz. Bu yüzden loader'a
            // "texture ararken buraya bak" diye ayrı bir kaynak yolu veriyoruz.
            const TEXTURES_URL = 'https://raw.githubusercontent.com/Softsprout/veloralp-case/main/Textures/';
            loader.setResourcePath(TEXTURES_URL);

            loader.load(
                CAR_FBX_URL,
                (fbx) => {
                    // FBX modelleri genelde çok büyük/küçük gelir, ölçeği projene göre ayarla.
                    fbx.scale.setScalar(0.03); // <-- modelin gerçek boyutuna göre bu değeri değiştir
                    // --- Texture eşleştirme + düz renk fallback ---
                    // FBX'te texture referansı yok, sadece 4 gerçek texture'ımız var.
                    // Materyal isimlerine göre elle eşleştiriyoruz; eşleşmeyenler için
                    // isme bakarak mantıklı bir düz renk/PBR değeri atıyoruz.
                    const texLoader = new THREE.TextureLoader();
                    const TEX_BASE = TEXTURES_URL;

                    const tyreTex = texLoader.load(TEX_BASE + 'Tyre.png');
                    const brakeTex = texLoader.load(TEX_BASE + 'Car.Brake-Disk.BMP.png');
                    const plateTex = texLoader.load(TEX_BASE + 'NumernSchildAudiR8.png');

                    // İsme göre düz renk/PBR ayarları (materyal adı -> ayar)
                    function styleMaterialByName(mat) {
                        const n = mat.name || '';

                        if (/Tyre/i.test(n)) {
                            mat.map = tyreTex;
                            mat.color.set(0xffffff);
                            mat.roughness = 0.9;
                            mat.metalness = 0.0;
                        } else if (/BrakeDisc/i.test(n)) {
                            mat.map = brakeTex;
                            mat.color.set(0xffffff);
                            mat.roughness = 0.5;
                            mat.metalness = 0.8;
                        } else if (/NumberPlate/i.test(n) || /Plate/i.test(n)) {
                            mat.map = plateTex;
                            mat.color.set(0xffffff);
                        } else if (/Chrome/i.test(n) && !/Wheel/i.test(n)) {
                            mat.color.set(0x999999);
                            mat.metalness = 0.5;
                            mat.roughness = 0.35;
                        } else if (/WheelsChrome|Wheel.*Chrome|Centre|Ring/i.test(n)) {
                            mat.color.set(0x0a0a0a);
                            mat.metalness = 0.35;
                            mat.roughness = 0.5;
                        } else if (/CarbonFibre|Carbon/i.test(n)) {
                            mat.color.set(0x1a1a1a);
                            mat.metalness = 0.3;
                            mat.roughness = 0.4;
                        } else if (/BodyMaterials/i.test(n)) {
                            // Araba rengi: siyah (mat boya)
                            mat.color.set(0x0d0d0d);
                            mat.metalness = 0.2;
                            mat.roughness = 0.55;
                        } else if (/BlackGlossy/i.test(n)) {
                            mat.color.set(0x0a0a0a);
                            mat.metalness = 0.25;
                            mat.roughness = 0.45;
                        } else if (/Glass|Windscreen|Mirror/i.test(n)) {
                            mat.color.set(0x88aabb);
                            mat.transparent = true;
                            mat.opacity = 0.35;
                            mat.metalness = 0.1;
                            mat.roughness = 0.05;
                        } else if (/LightSource|FarLight|LightBack/i.test(n)) {
                            mat.color.set(0xffe08a);
                            mat.emissive = new THREE.Color(0xffcc55);
                            mat.emissiveIntensity = 0.6;
                        } else if (/HoneyComb|Brake\b|AirBackOutput|AirInput|Bolt|undercarriage|Axe|Ring|Centre/i.test(n)) {
                            mat.color.set(0x1c1c1c);
                            mat.metalness = 0.4;
                            mat.roughness = 0.6;
                        } else if (/RoofCanvas/i.test(n)) {
                            mat.color.set(0x111111);
                            mat.roughness = 0.9;
                        } else if (/AudiLogo/i.test(n)) {
                            mat.color.set(0xc0c0c0);
                            mat.metalness = 1.0;
                            mat.roughness = 0.1;
                        }
                        // eşleşmeyenler mevcut FBX rengiyle kalır
                        mat.needsUpdate = true;
                    }

                    fbx.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;

                            const mats = Array.isArray(child.material) ? child.material : [child.material];
                            mats.forEach(styleMaterialByName);
                        }
                    });

                    // Modelin "ileri" yönü Three.js'in -Z ekseniyle uyuşmayabilir,
                    // gerekirse burada rotation.y = Math.PI ekleyerek çevir.

                    car.add(fbx);
                    loadingEl.classList.add('hidden');
                },
                undefined,
                (err) => {
                    console.warn('car.fbx yüklenemedi, placeholder araba kullanılıyor:', err);
                    addPlaceholderCar();
                    loadingEl.classList.add('hidden');
                }
            );

            // Yükleme 5 saniyede tamamlanmazsa da placeholder ile devam et (kilitlenmeyi önle)
            setTimeout(() => {
                if (!loadingEl.classList.contains('hidden')) {
                    if (car.children.length === 0) addPlaceholderCar();
                    loadingEl.classList.add('hidden');
                }
            }, 5000);

            // ------------------------------
            // Sürüş fiziği (arcade + hafif drift/momentum)
            // ------------------------------
            const carState = {
                speed: 0,          // ileri yön hızı
                maxSpeed: 32,       // birim/s
                maxReverse: -10,
                acceleration: 14,
                brakeForce: 24,
                friction: 8,        // gaz bırakınca yavaşlama
                steerAngle: 0,       // teker açısı (radyan)
                maxSteer: 0.55,
                steerSpeed: 2.5,
                steerReturn: 3.0,
                heading: 0,          // arabanın baktığı yön (radyan)
                lateralVelocity: 0,   // hafif drift için yanal kayma
                driftFactor: 0.10,   // ne kadar drift hissedilecek (0 = yok, yüksek = kayar)
            };

            const input = { forward: false, backward: false, left: false, right: false };

            // Klavye
            window.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'w': case 'ArrowUp': input.forward = true; break;
                    case 's': case 'ArrowDown': input.backward = true; break;
                    case 'a': case 'ArrowLeft': input.left = true; break;
                    case 'd': case 'ArrowRight': input.right = true; break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch (e.key) {
                    case 'w': case 'ArrowUp': input.forward = false; break;
                    case 's': case 'ArrowDown': input.backward = false; break;
                    case 'a': case 'ArrowLeft': input.left = false; break;
                    case 'd': case 'ArrowRight': input.right = false; break;
                }
            });

            // Dokunmatik butonlar
            function bindTouchBtn(id, onDown, onUp) {
                const el = document.getElementById(id);
                const start = (e) => { e.preventDefault(); onDown(); el.classList.add('active'); };
                const end = (e) => { e.preventDefault(); onUp(); el.classList.remove('active'); };
                el.addEventListener('touchstart', start, { passive: false });
                el.addEventListener('touchend', end, { passive: false });
                el.addEventListener('touchcancel', end, { passive: false });
                // Masaüstünde mouse ile de test edilebilsin
                el.addEventListener('mousedown', start);
                el.addEventListener('mouseup', end);
                el.addEventListener('mouseleave', end);
            }
            bindTouchBtn('btnGas', () => input.forward = true, () => input.forward = false);
            bindTouchBtn('btnBrake', () => input.backward = true, () => input.backward = false);
            bindTouchBtn('btnLeft', () => input.left = true, () => input.left = false);
            bindTouchBtn('btnRight', () => input.right = true, () => input.right = false);

            // ------------------------------
            // Kamera: NFS MW tarzı alçak takip (chase cam)
            // ------------------------------
            const introCamOffset = new THREE.Vector3(0, 2.5, -10); // Başlangıç pozisyonu
            const gameplayCamOffset = new THREE.Vector3(0, 5.5, -14); // Kalıcı oyun pozisyonu (daha yüksek)

            const camLookOffset = new THREE.Vector3(0, 1.8, 15);
            const camPos = new THREE.Vector3();
            const camLook = new THREE.Vector3();

            function updateCamera(dt) {
                // Intro efekti (oyun başından geçen süre)
                const elapsed = clock ? clock.getElapsedTime() : 0;

                let currentOffset;
                if (elapsed < 1.0) {
                    // İlk 1 saniye başlangıç noktasında bekle
                    currentOffset = introCamOffset.clone();
                } else {
                    // 1. saniyeden sonra, 2 saniye içinde yavaşça gameplay pozisyonuna geç (smooth transition)
                    const transitionProgress = Math.min((elapsed - 1.0) / 2.0, 1.0);
                    // Daha yumuşak bir eğri (ease-in-out)
                    const smoothStep = transitionProgress * transitionProgress * (3 - 2 * transitionProgress);
                    currentOffset = introCamOffset.clone().lerp(gameplayCamOffset, smoothStep);
                }

                const rotatedOffset = currentOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), carState.heading);
                const targetCamPos = car.position.clone().add(rotatedOffset);

                // Kamera her zaman arabanın hareketini yumuşak takip etsin
                camPos.lerp(targetCamPos, Math.min(1, dt * 6));

                // Bakış noktası
                const rotatedLook = camLookOffset.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), carState.heading);
                const targetLook = car.position.clone().add(rotatedLook);

                camLook.lerp(targetLook, Math.min(1, dt * 8));

                camera.position.copy(camPos);
                camera.lookAt(camLook);
            }

            // ------------------------------
            // Fizik güncelleme
            // ------------------------------
            const speedValEl = document.getElementById('speedVal');

            function updateCar(dt) {
                // Gaz / fren-geri
                if (input.forward) {
                    carState.speed += carState.acceleration * dt;
                } else if (input.backward) {
                    carState.speed -= carState.brakeForce * dt;
                } else {
                    // sürtünme ile doğal yavaşlama
                    if (carState.speed > 0) {
                        carState.speed = Math.max(0, carState.speed - carState.friction * dt);
                    } else if (carState.speed < 0) {
                        carState.speed = Math.min(0, carState.speed + carState.friction * dt);
                    }
                }
                carState.speed = THREE.MathUtils.clamp(carState.speed, carState.maxReverse, carState.maxSpeed);

                // Direksiyon (teker açısı yumuşak geçiş)
                let steerInput = 0;
                if (input.left) steerInput += 1;
                if (input.right) steerInput -= 1;

                if (steerInput !== 0) {
                    carState.steerAngle += steerInput * carState.steerSpeed * dt;
                    carState.steerAngle = THREE.MathUtils.clamp(carState.steerAngle, -carState.maxSteer, carState.maxSteer);
                } else {
                    // merkeze dönüş
                    if (carState.steerAngle > 0) {
                        carState.steerAngle = Math.max(0, carState.steerAngle - carState.steerReturn * dt);
                    } else if (carState.steerAngle < 0) {
                        carState.steerAngle = Math.min(0, carState.steerAngle + carState.steerReturn * dt);
                    }
                }

                // Sadece hareket halindeyken dönüş uygula (duruyorken araba dönmesin)
                const speedFactor = THREE.MathUtils.clamp(Math.abs(carState.speed) / carState.maxSpeed, 0, 1);
                const turnAmount = carState.steerAngle * speedFactor * dt * 2.2;

                // Geri giderken direksiyon yönü ters olur
                const dir = carState.speed >= 0 ? 1 : -1;
                carState.heading += turnAmount * dir;

                // Hafif drift: yanal kaymayı direksiyon açısına ve hıza göre hesapla, sonra sönümle
                const targetLateral = carState.steerAngle * speedFactor * carState.driftFactor * carState.speed;
                carState.lateralVelocity = THREE.MathUtils.lerp(carState.lateralVelocity, targetLateral, dt * 3);

                // Pozisyonu güncelle: ileri yön + yanal kayma
                const forwardVec = new THREE.Vector3(Math.sin(carState.heading), 0, Math.cos(carState.heading));
                const rightVec = new THREE.Vector3(Math.cos(carState.heading), 0, -Math.sin(carState.heading));

                car.position.addScaledVector(forwardVec, carState.speed * dt);
                car.position.addScaledVector(rightVec, carState.lateralVelocity * dt);

                car.rotation.y = carState.heading;

                // HUD güncelle
                speedValEl.textContent = Math.round(Math.abs(carState.speed) * 3.6); // kabaca km/h hissi
            }



            // ------------------------------
            // Resize
            // ------------------------------
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ------------------------------
            // Ana döngü
            // ------------------------------
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05); // büyük sıçramaları engelle

                updateCar(dt);
                updateCamera(dt);

                // Hava efektleri (Şimşek)
                updateLightning(dt);

                // Far ışıklarını güncelle
                updateHeadlights();

                // Sınırsız dünya güncelle
                updateInfiniteWorld();

                renderer.render(scene, camera);
            }
            animate();

        })();
    </script>
